name: Deploy web to GitHub Pages

on:
  workflow_run:
    workflows: ["Auto Version & Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-changes:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check if this is the latest commit and web files changed
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch the tip of main to detect if auto-version pushed a release commit after this one
          git fetch origin main --depth=1
          LATEST_SHA=$(git rev-parse origin/main)
          TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"

          if [ "$TRIGGER_SHA" != "$LATEST_SHA" ]; then
            # A newer commit exists (the chore(release) bump). Skip — we'll run again after that one.
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --name-only HEAD~1 HEAD | grep -qE '^(web/|src/version\.py)'; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build site
        run: npm run build
        working-directory: web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
